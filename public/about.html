<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="MVTP 운영자 정보 페이지입니다." />
    <title>내 정보 | MVTP Cloud</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="profile-body">
    <main class="profile-page">
      <header class="profile-header">
        <a class="button button-secondary profile-back" href="/">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m12 19-7-7 7-7" />
            <path d="M19 12H5" />
          </svg>
          홈으로
        </a>
      </header>

      <section class="profile-hero" aria-label="Owner profile">
        <div class="profile-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="8" r="5" />
            <path d="M20 21a8 8 0 0 0-16 0" />
          </svg>
        </div>
        <p class="eyebrow">Owner profile</p>
        <h1>MVTP Owner</h1>
        <p>개인 정보는 추후 입력할 수 있도록 페이지 구조만 준비되어 있습니다.</p>
      </section>

      <section class="profile-details" aria-label="Profile details">
        <article class="profile-card">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" />
            <path d="m9 12 2 2 4-4" />
          </svg>
          <div>
            <span>Role</span>
            <strong>Server Operator</strong>
          </div>
        </article>
        <article class="profile-card">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
          <div>
            <span>Location</span>
            <strong>추후 입력</strong>
          </div>
        </article>
        <article class="profile-card">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m22 7-8.991 5.727a2 2 0 0 1-2.018 0L2 7" />
            <rect x="2" y="4" width="20" height="16" rx="2" />
          </svg>
          <div>
            <span>Contact</span>
            <strong>추후 입력</strong>
          </div>
        </article>
      </section>

      <section class="profile-interests" aria-label="Interests">
        <p class="eyebrow">Interests</p>
        <div>
          <span class="badge badge-neutral">Home Lab</span>
          <span class="badge badge-neutral">Cloud</span>
          <span class="badge badge-neutral">Security</span>
          <span class="badge badge-neutral">Web Service</span>
        </div>
      </section>
    </main>
  </body>
</html>
